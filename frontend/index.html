<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;500;700;800&display=swap" rel="stylesheet">
  <title>LoginApp</title>
</head>

<body>
  <div id="error-overlay" style="color: red; background: black; font-size: 20px; z-index: 9999; position: absolute;"></div>
  <script>
    window.onerror = function(message, source, lineno, colno, error) {
      document.getElementById('error-overlay').innerText = 'ERROR: ' + message + '\n' + (error ? error.stack : '');
    };
  </script>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
