services:
  - type: web
    name: loginapp
    runtime: node
    buildCommand: npm install --prefix backend && npm install --prefix frontend && npm run build --prefix frontend
    startCommand: npm start --prefix backend
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: loginapp-db
          property: connectionString

databases:
  - name: loginapp-db
    databaseName: loginapp
    user: loginapp_user
