services:
  - type: web
    name: loginapp
    runtime: node
    buildCommand: npm install --prefix backend && npm install --prefix frontend && npm run build --prefix frontend
    startCommand: npm start --prefix backend
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: loginapp-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false   # Set this to your Render app URL, e.g. https://loginapp.onrender.com
      - key: EMAIL_USER
        sync: false   # Your Gmail address
      - key: EMAIL_PASS
        sync: false   # Your Gmail App Password

databases:
  - name: loginapp-db
    databaseName: loginapp
    user: loginapp_user
